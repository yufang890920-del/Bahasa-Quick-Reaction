<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B2C5C">
<title>BahasaFlow · 印尼语流利度训练营</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇮🇩</text></svg>">
<style>
:root{--ink:#1E2749;--deep:#1B2C5C;--sand:#F7F3EB;--paper:#FFFDF8;--merah:#C93A3A;--gold:#C9962E;--teal:#3E7C7B;--line:#E4DCCB;--faint:#8B8574}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:linear-gradient(180deg,var(--sand),#FBF8F1);min-height:100vh;color:var(--ink)}
.wrap{max-width:520px;margin:0 auto;padding:0 18px 60px}
header{padding:26px 0 6px}
h1{margin:0;font-family:Georgia,serif;font-size:26px;color:var(--deep)}
h1 b{color:var(--merah)}
.sub{margin:2px 0 0;font-size:12px;color:var(--faint);letter-spacing:2px}
.intro{font-size:13.5px;line-height:1.8;color:var(--faint);margin:14px 0 20px}
.intro b{color:var(--ink)}
.modes{display:grid;gap:12px}
.mode{cursor:pointer;background:var(--paper);border:1.5px solid var(--line);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(30,39,73,.05);text-align:left;width:100%;font:inherit;color:inherit}
.mode .ic{font-size:30px}
.mode .nm{font-weight:700;font-size:16px;color:var(--deep);display:block}
.mode .ds{font-size:12.5px;color:var(--faint);display:block;margin-top:2px}
.mode .pn{font-size:11px;color:var(--merah);font-weight:700;white-space:nowrap}
.mode>span:nth-child(2){flex:1}
.tip{font-size:12px;color:var(--faint);margin-top:18px;line-height:1.7}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:14px;box-shadow:0 4px 16px rgba(30,39,73,.06)}
.btn{cursor:pointer;text-align:center;padding:14px 0;border-radius:12px;background:var(--deep);color:#F2E8D5;font-weight:700;font-size:15px;width:100%;border:none;font-family:inherit;display:block}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink);font-weight:600}
.btn.red{background:var(--merah)}.btn.teal{background:var(--teal)}
.back{cursor:pointer;font-size:13px;color:var(--faint);background:none;border:none;font-family:inherit;padding:0;display:block;margin-bottom:12px}
.serif{font-family:Georgia,serif;font-style:italic}
.bar{position:relative;height:6px;background:var(--line);border-radius:99px;margin:10px 0 26px;overflow:hidden}
.bar>div{position:absolute;left:0;top:0;bottom:0;background:var(--gold);transition:width 1s linear}
.opt{cursor:pointer;padding:12px 14px;border-radius:16px 16px 4px 16px;border:1.5px solid var(--line);background:var(--paper);width:100%;text-align:left;font-family:inherit;transition:all .2s}
.opt .id{font-family:Georgia,serif;font-style:italic;font-size:15.5px;color:var(--ink);display:block}
.opt .zh{font-size:12px;color:var(--faint)}
.opt.ok{background:#EAF4F1;border-color:var(--teal)}.opt.ok .id{color:var(--teal)}
.opt.bad{background:#FBEAEA;border-color:var(--merah)}.opt.bad .id{color:var(--merah)}
.lvbtn{cursor:pointer;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700;background:transparent;color:var(--faint);border:1.5px solid var(--line);font-family:inherit}
.lvbtn.on{background:var(--deep);color:#F2E8D5;border-color:var(--deep)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.center{text-align:center}
.faint{color:var(--faint)}
.scenes{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.scene{cursor:pointer;background:var(--paper);border:1.5px solid var(--line);border-radius:16px;padding:18px 14px;text-align:center;box-shadow:0 2px 8px rgba(30,39,73,.05);font-family:inherit}
.bubble{background:var(--deep);color:#F2E8D5;border-radius:16px 16px 16px 4px;padding:14px 16px;margin-bottom:6px;max-width:88%}
.playbtn{cursor:pointer;width:96px;height:96px;border-radius:50%;background:var(--deep);color:#F2E8D5;font-size:38px;border:none;box-shadow:0 8px 24px rgba(27,44,92,.35);margin:14px 0}
.score{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.hid{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Bahasa<b>Flow</b></h1>
    <p class="sub">流利度训练营 · 听得懂 说得快 发音准</p>

/* ============ 工具 ============ */
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function speak(text,rate){try{window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang="id-ID";u.rate=rate||0.85;var vs=window.speechSynthesis.getVoices();for(var i=0;i<vs.length;i++){if(vs[i].lang&&vs[i].lang.indexOf("id")===0){u.voice=vs[i];break}}window.speechSynthesis.speak(u)}catch(e){}}
function norm(s){return s.toLowerCase().replace(/[.,!?'"-]/g,"").trim()}
var app=document.getElementById("app");
var timer=null;
function clearT(){if(timer){clearInterval(timer);timer=null}}
window.speechSynthesis&&window.speechSynthesis.getVoices();

/* ============ 主页 ============ */
function home(){
  clearT();window.speechSynthesis&&window.speechSynthesis.cancel();
  app.innerHTML=
  '<p class="intro">你已掌握核心150词——现在的瓶颈不是词汇量，而是<b>提取速度</b>。所有训练都带时间压力和真实语音，逼大脑从"翻译思维"切换到"直觉反应"。建议每天：⚡5分钟 + 🎧8分钟 + 🎤8分钟 + 🎬9分钟 = 30分钟。</p>'+
  '<div class="modes">'+
  '<button class="mode" onclick="flashStart()"><span class="ic">⚡</span><span><span class="nm">闪电反应</span><span class="ds">6秒倒计时·中文→脱口说印尼语</span></span><span class="pn">治「反应不过来」</span></button>'+
  '<button class="mode" onclick="listenStart()"><span class="ic">🎧</span><span><span class="nm">盲听理解</span><span class="ds">先听不看字·语速三档可调</span></span><span class="pn">治「听不流畅」</span></button>'+
  '<button class="mode" onclick="speakStart()"><span class="ic">🎤</span><span><span class="nm">跟读评分</span><span class="ds">听示范→录音·逐词比对打分</span></span><span class="pn">治「发音不准」</span></button>'+
  '<button class="mode" onclick="sceneMenu()"><span class="ic">🎬</span><span><span class="nm">场景实战</span><span class="ds">6大场景·8秒限时应答</span></span><span class="pn">综合流利度</span></button>'+
  '</div>'+
  '<p class="tip">🔊 使用手机浏览器内置的印尼语语音朗读与识别，🎤评分需麦克风权限，安卓 Chrome 体验最佳。若朗读无声，请在系统设置中下载印尼语语音包。</p>';
}

/* ============ ⚡ 闪电反应 ============ */
var F={};
function flashStart(){F={pool:shuffle(FLASH).slice(0,10),i:0,ok:0};flashGo()}
function flashGo(){
  clearT();var left=6;
  render();
  timer=setInterval(function(){left--;var b=document.getElementById("fbar");var n=document.getElementById("fnum");if(b)b.style.width=(left/6*100)+"%";if(n){n.textContent=left;if(left<=2){n.style.color="var(--merah)";if(b)b.style.background="var(--merah)"}}if(left<=0){clearT();flashReveal()}},1000);
  function render(){
    app.innerHTML='<div class="card center">'+
    '<p style="font-size:13px" class="faint">第 '+(F.i+1)+'/'+F.pool.length+' 题 · 看到中文，<b>立刻大声说出印尼语</b></p>'+
    '<div class="bar"><div id="fbar" style="width:100%"></div></div>'+
    '<h2 style="font-size:32px;margin:0 0 8px">'+esc(F.pool[F.i][0])+'</h2>'+
    '<p id="fnum" class="serif" style="font-size:40px;color:var(--gold);margin:16px 0">6</p>'+
    '<button class="btn ghost" onclick="clearT();flashReveal()">说完了 / 直接看答案</button>'+
    '<button class="back" style="margin:18px auto 0" onclick="home()">← 返回</button></div>';
  }
}
function flashReveal(){
  var ans=F.pool[F.i][1];speak(ans,0.9);
  app.innerHTML='<div class="card center">'+
  '<p style="font-size:13px" class="faint">第 '+(F.i+1)+'/'+F.pool.length+' 题</p>'+
  '<h2 style="font-size:26px;margin:0">'+esc(F.pool[F.i][0])+'</h2>'+
  '<p class="serif" style="font-size:24px;color:var(--deep);margin:18px 0 6px">'+esc(ans)+'</p>'+
  '<button class="back" style="color:var(--teal);font-weight:700;margin:0 auto" onclick="speak('+JSON.stringify(ans).replace(/"/g,"&quot;")+',0.85)">🔊 再听一遍</button>'+
  '<p style="font-size:13px;margin:18px 0 10px" class="faint">你在倒计时内说对了吗？（诚实自评）</p>'+
  '<div class="grid2"><button class="btn teal" onclick="flashGrade(1)">✓ 说对了</button><button class="btn red" onclick="flashGrade(0)">✗ 没反应过来</button></div></div>';
}
function flashGrade(ok){
  if(ok)F.ok++;
  F.i++;
  if(F.i>=F.pool.length){
    app.innerHTML='<div class="card center"><div style="font-size:44px">⚡</div>'+
    '<h3 class="serif" style="font-size:26px;color:var(--deep);margin:8px 0 4px">'+F.ok+' / '+F.pool.length+'</h3>'+
    '<p class="faint" style="font-size:14px;margin:0 0 20px">6秒内能脱口而出的句子数。目标是连续3天满分——那时你的反应就自动化了。</p>'+
    '<div style="display:grid;gap:10px"><button class="btn red" onclick="flashStart()">再来一轮（换题）</button><button class="btn ghost" onclick="home()">返回</button></div></div>';
  }else flashGo();
}

/* ============ 🎧 盲听理解 ============ */
var L={};
function listenStart(){L={lv:1,rate:0.75,pool:shuffle(SPEAK[1]),i:0,plays:0,revealed:false};listenRender()}
function listenSetLv(l){L.lv=l;L.pool=shuffle(SPEAK[l]);L.i=0;L.plays=0;L.revealed=false;listenRender()}
function listenRate(){L.rate=L.rate>=1?0.6:L.rate+0.15;listenRender()}
function listenPlay(){speak(L.pool[L.i%L.pool.length],L.rate);L.plays++;var p=document.getElementById("lplays");if(p)p.textContent="已播放 "+L.plays+" 次（听懂前可反复听）"}
function listenReveal(){L.revealed=true;listenRender()}
function listenNext(){L.i++;L.plays=0;L.revealed=false;listenRender()}
function listenRender(){
  var cur=L.pool[L.i%L.pool.length];
  var rateLabel=L.rate<=0.65?"慢":L.rate<=0.8?"中":"快";
  app.innerHTML='<div class="card">'+
  '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'+
  '<button class="lvbtn'+(L.lv===1?" on":"")+'" onclick="listenSetLv(1)">短句</button>'+
  '<button class="lvbtn'+(L.lv===2?" on":"")+'" onclick="listenSetLv(2)">长句</button>'+
  '<button class="lvbtn'+(L.lv===3?" on":"")+'" onclick="listenSetLv(3)">复合句</button>'+
  '<button class="lvbtn" style="margin-left:auto;color:var(--gold);border-color:var(--gold)" onclick="listenRate()">语速 '+rateLabel+'</button></div>'+
  '<div class="center" style="padding:18px 0">'+
  '<p style="font-size:13px" class="faint">先听，<b>不看文字</b>，在脑中理解意思后再揭晓</p>'+
  '<button class="playbtn" onclick="listenPlay()">🔊</button>'+
  '<p id="lplays" style="font-size:12px" class="faint">已播放 '+L.plays+' 次（听懂前可反复听）</p>'+
  (L.revealed?
    '<div style="margin:16px 0"><p class="serif" style="font-size:22px;color:var(--deep);margin:0 0 16px">'+esc(cur)+'</p>'+
    '<p style="font-size:13px;color:var(--teal);margin:0 0 18px">现在跟着读一遍，然后进入下一句 →</p>'+
    '<button class="btn" onclick="listenNext()">下一句</button></div>'
    :'<button class="btn ghost" style="margin-top:12px" onclick="listenReveal()">听懂了，揭晓原文</button>')+
  '<button class="back" style="margin:18px auto 0" onclick="home()">← 返回</button></div></div>';
}

/* ============ 🎤 跟读评分 ============ */
var S={};
function speakStart(){S={lv:1,pool:shuffle(SPEAK[1]),i:0,result:null,err:null,listening:false};speakRender()}
function speakSetLv(l){S.lv=l;S.pool=shuffle(SPEAK[l]);S.i=0;S.result=null;S.err=null;speakRender()}
function speakNext(){S.i++;S.result=null;S.err=null;speakRender()}
function speakDemo(){speak(S.pool[S.i%S.pool.length],0.75)}
function speakRec(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){S.err="nosupport";speakRender();return}
  var cur=S.pool[S.i%S.pool.length];
  S.result=null;S.err=null;S.listening=true;speakRender();
  var rec=new SR();rec.lang="id-ID";rec.interimResults=false;rec.maxAlternatives=3;
  rec.onresult=function(e){
    var heard=e.results[0][0].transcript;
    var t=norm(cur).split(/\s+/),h=norm(heard).split(/\s+/);
    var words=[],hit=0;
    for(var i=0;i<t.length;i++){var ok=h.indexOf(t[i])>=0;if(ok)hit++;words.push([t[i],ok])}
    S.result={heard:heard,pct:Math.round(hit/t.length*100),words:words};
    S.listening=false;speakRender();
  };
  rec.onerror=function(e){S.err=(e.error==="not-allowed"?"mic":"other");S.listening=false;speakRender()};
  rec.onend=function(){if(S.listening){S.listening=false;speakRender()}};
  try{rec.start()}catch(e){S.err="other";S.listening=false;speakRender()}
}
function speakRender(){
  var cur=S.pool[S.i%S.pool.length];
  var sentHtml;
  if(S.result){
    sentHtml="";
    for(var i=0;i<S.result.words.length;i++){var w=S.result.words[i];
      sentHtml+='<span style="color:'+(w[1]?"var(--teal)":"var(--merah)")+';'+(w[1]?"":"border-bottom:2px solid var(--merah)")+'">'+esc(w[0])+' </span>'}
  }else sentHtml=esc(cur);
  var errMsg="";
  if(S.err==="nosupport")errMsg='<p style="font-size:13px;color:var(--merah)" class="center">当前浏览器不支持语音识别，请改用安卓 Chrome 打开。</p>';
  if(S.err==="mic")errMsg='<p style="font-size:13px;color:var(--merah)" class="center">需要麦克风权限才能评分，请在浏览器设置中允许。</p>';
  if(S.err==="other")errMsg='<p style="font-size:13px;color:var(--merah)" class="center">没听清，请靠近麦克风再试一次。</p>';
  var scoreHtml="";
  if(S.result){
    var pct=S.result.pct,col=pct>=80?"var(--teal)":pct>=50?"var(--gold)":"var(--merah)";
    var cmt=pct>=80?"发音很清晰！":pct>=50?"不错，红字的词再练":"别灰心，先听示范再逐词模仿";
    scoreHtml='<div class="score"><div style="display:flex;justify-content:space-between;align-items:baseline">'+
    '<span class="serif" style="font-size:30px;font-weight:700;color:'+col+'">'+pct+'分</span>'+
    '<span style="font-size:12px" class="faint">'+cmt+'</span></div>'+
    '<p style="font-size:12.5px;margin:8px 0 0" class="faint">系统听到：「'+esc(S.result.heard)+'」</p></div>';
  }
  app.innerHTML='<div class="card">'+
  '<div style="display:flex;gap:8px;margin-bottom:16px">'+
  '<button class="lvbtn'+(S.lv===1?" on":"")+'" onclick="speakSetLv(1)">Lv1</button>'+
  '<button class="lvbtn'+(S.lv===2?" on":"")+'" onclick="speakSetLv(2)">Lv2</button>'+
  '<button class="lvbtn'+(S.lv===3?" on":"")+'" onclick="speakSetLv(3)">Lv3</button></div>'+
  '<p style="font-size:13px;margin:0 0 6px" class="faint center">先听示范 → 再按录音跟读 → 系统识别你的发音逐词打分</p>'+
  '<p class="serif center" style="font-size:24px;color:var(--deep);margin:12px 0 18px">'+sentHtml+'</p>'+
  '<div class="grid2" style="margin-bottom:14px">'+
  '<button class="btn teal" onclick="speakDemo()">🔊 听示范</button>'+
  '<button class="btn'+(S.listening?" red":"")+'" onclick="speakRec()" '+(S.listening?"disabled":"")+'>'+(S.listening?"● 正在听你说…":"🎤 录音跟读")+'</button></div>'+
  scoreHtml+errMsg+
  '<div style="display:grid;gap:10px;margin-top:6px">'+
  '<button class="btn ghost" onclick="speakNext()">下一句 →</button>'+
  '<button class="back" style="margin:0 auto" onclick="home()">← 返回</button></div></div>';
}

/* ============ 🎬 场景实战 ============ */
var G={};
function sceneMenu(){
  clearT();
  var h='<button class="back" onclick="home()">← 返回</button><div class="scenes">';
  for(var i=0;i<SCENES.length;i++){
    h+='<button class="scene" onclick="sceneStart('+i+')"><span style="font-size:32px;display:block">'+SCENES[i].icon+'</span>'+
    '<span style="font-weight:700;font-size:15px;color:var(--deep);display:block;margin-top:6px">'+SCENES[i].name+'</span>'+
    '<span style="font-size:12px" class="faint">'+SCENES[i].lines.length+' 回合</span></button>';
  }
  app.innerHTML=h+'</div>';
}
function sceneStart(si){G={si:si,i:0,score:0};sceneGo()}
function sceneGo(){
  clearT();
  var sc=SCENES[G.si],line=sc.lines[G.i];
  G.opts=shuffle(line.r);G.picked=null;
  speak(line.id,0.8);
  var left=8;
  render(false);
  timer=setInterval(function(){left--;
    var b=document.getElementById("sbar"),n=document.getElementById("snum");
    if(b){b.style.width=(left/8*100)+"%";if(left<=3)b.style.background="var(--merah)"}
    if(n){n.textContent="⏱ "+left+"s";if(left<=3)n.style.color="var(--merah)"}
    if(left<=0){clearT();G.picked="timeout";render(true)}
  },1000);
  function render(showAns){
    var h='<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<span style="font-size:13px;font-weight:700;color:var(--deep)">'+sc.icon+' '+sc.name+' · 回合 '+(G.i+1)+'/'+sc.lines.length+'</span>'+
    '<span id="snum" style="font-size:13px;font-weight:700" class="faint">⏱ 8s</span></div>'+
    '<div class="bar" style="margin-bottom:18px;height:5px"><div id="sbar" style="width:100%;background:var(--teal)"></div></div>'+
    '<div class="bubble"><p class="serif" style="margin:0;font-size:17px">'+esc(line.id)+'</p>'+
    '<p id="szh" style="margin:6px 0 0;font-size:12.5px;color:#8FA0CC;display:none">'+esc(line.zh)+'</p></div>'+
    '<div style="display:flex;gap:14px;margin-bottom:18px">'+
    '<button class="back" style="margin:0;color:var(--teal);font-weight:700" onclick="sceneHear()">🔊 重听</button>'+
    '<button class="back" style="margin:0" onclick="document.getElementById(\'szh\').style.display=\'block\'">看中文提示</button></div>'+
    '<p style="font-size:13px;margin:0 0 10px" class="faint">8秒内选出你的回应，选完<b>大声读出来</b>：</p>'+
    '<div style="display:grid;gap:10px">';
    for(var k=0;k<G.opts.length;k++){
      var r=G.opts[k],cls="opt";
      if(G.picked!==null){if(r[2])cls+=" ok";else if(G.picked===k)cls+=" bad"}
      h+='<button class="'+cls+'" onclick="scenePick('+k+')"><span class="id">'+esc(r[0])+'</span>'+
      (G.picked!==null?'<span class="zh">'+esc(r[1])+'</span>':"")+'</button>';
    }
    h+='</div>';
    if(G.picked==="timeout")h+='<p style="font-size:13px;color:var(--merah);margin:12px 0 0" class="center">超时了！真实对话的沉默就是这种感觉——听正确答案，跟读一遍再继续。</p>';
    if(G.picked!==null)h+='<button class="btn" style="margin-top:14px" onclick="sceneNext()">'+(G.i+1>=sc.lines.length?"查看结果":"下一回合 →")+'</button>';
    h+='</div>';
    app.innerHTML=h;
  }
  G.render=render;
}
function sceneHear(){speak(SCENES[G.si].lines[G.i].id,0.75)}
function scenePick(k){
  if(G.picked!==null)return;
  clearT();G.picked=k;
  var r=G.opts[k];
  if(r[2]){G.score++;speak(r[0],0.85)}
  G.render(true);
}
function sceneNext(){
  var sc=SCENES[G.si];
  if(G.i+1>=sc.lines.length){
    clearT();
    app.innerHTML='<div class="card center"><div style="font-size:44px">'+sc.icon+'</div>'+
    '<h3 class="serif" style="font-size:24px;color:var(--deep);margin:8px 0 4px">'+sc.name+' · '+G.score+'/'+sc.lines.length+'</h3>'+
    '<p class="faint" style="font-size:14px;margin:0 0 20px">'+(G.score===sc.lines.length?"全对！这个场景你已经能实战了。":"把没答对的回合重跑一遍——真实对话中对方不会给你第二次8秒。")+'</p>'+
    '<div style="display:grid;gap:10px"><button class="btn red" onclick="sceneStart('+G.si+')">重跑本场景</button>'+
    '<button class="btn ghost" onclick="sceneMenu()">选择其他场景</button></div></div>';
  }else{G.i++;sceneGo()}
}

home();
</script>
