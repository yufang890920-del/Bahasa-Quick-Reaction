<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>BahasaFlow · 印尼语30天流利训练营</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇮🇩</text></svg>">
<style>
:root{--ink:#1E2749;--deep:#1B2C5C;--sand:#F7F3EB;--paper:#FFFDF8;--merah:#C93A3A;--gold:#C9962E;--teal:#3E7C7B;--line:#E4DCCB;--faint:#8B8574}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:linear-gradient(180deg,var(--sand),#FBF8F1);min-height:100vh;color:var(--ink)}
.wrap{max-width:520px;margin:0 auto;padding:0 18px 60px}
header{padding:26px 0 6px;display:flex;justify-content:space-between;align-items:baseline}
h1{margin:0;font-family:Georgia,serif;font-size:26px;color:var(--deep)}
h1 b{color:var(--merah)}
.sub{margin:2px 0 0;font-size:12px;color:var(--faint);letter-spacing:2px}
.hstat{text-align:right}.hstat .n{font-family:Georgia,serif;font-size:22px;color:var(--gold);font-weight:700}.hstat .n span{font-size:13px;color:var(--faint)}.hstat .l{font-size:11px;color:var(--faint)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:14px;box-shadow:0 4px 16px rgba(30,39,73,.06)}
.today{cursor:pointer;background:var(--deep);border-radius:18px;padding:22px;margin:14px 0 8px;box-shadow:0 10px 28px rgba(27,44,92,.3);border:none;width:100%;text-align:left;font-family:inherit;position:relative;overflow:hidden}
.today .ring{position:absolute;right:-18px;top:-18px;width:110px;height:110px;border-radius:50%;border:2px dashed rgba(201,150,46,.35)}
.pill{display:inline-block;font-size:11px;letter-spacing:1.5px;color:var(--gold);border:1px solid rgba(201,150,46,.4);border-radius:99px;padding:3px 10px;font-weight:600}
.today h2{margin:12px 0 4px;font-family:Georgia,serif;font-size:23px;color:#F2E8D5}
.today .g{margin:0;font-size:13px;color:#8FA0CC}
.today .go{margin-top:14px;display:inline-block;background:var(--merah);color:#fff;border-radius:99px;padding:8px 20px;font-size:14px;font-weight:700}
.dots{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:4px 0}
.dot{aspect-ratio:1;border-radius:50%;border:1.5px solid var(--line);background:var(--paper);color:var(--faint);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.dot.done{background:var(--teal);border-color:var(--teal);color:#fff}
.dot.cur{background:var(--merah);border-color:var(--merah);color:#fff;transform:scale(1.12)}
.btn{cursor:pointer;text-align:center;padding:14px 0;border-radius:12px;background:var(--deep);color:#F2E8D5;font-weight:700;font-size:15px;width:100%;border:none;font-family:inherit;display:block}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink);font-weight:600}
.btn.red{background:var(--merah)}.btn.teal{background:var(--teal)}
.back{cursor:pointer;font-size:13px;color:var(--faint);background:none;border:none;font-family:inherit;padding:0;display:block;margin-bottom:12px}
.serif{font-family:Georgia,serif;font-style:italic}
.bar{position:relative;height:6px;background:var(--line);border-radius:99px;margin:10px 0 26px;overflow:hidden}
.bar>div{position:absolute;left:0;top:0;bottom:0;background:var(--gold);transition:width 1s linear}
.steps{display:flex;gap:6px;margin:0 0 16px}
.steps span{flex:1;height:4px;border-radius:99px;background:var(--line)}
.steps span.on{background:var(--gold)}
.opt{cursor:pointer;padding:12px 14px;border-radius:16px 16px 4px 16px;border:1.5px solid var(--line);background:var(--paper);width:100%;text-align:left;font-family:inherit;transition:all .2s}
.opt .id{font-family:Georgia,serif;font-style:italic;font-size:15.5px;color:var(--ink);display:block}
.opt .zh{font-size:12px;color:var(--faint)}
.opt.ok{background:#EAF4F1;border-color:var(--teal)}.opt.ok .id{color:var(--teal)}
.opt.bad{background:#FBEAEA;border-color:var(--merah)}.opt.bad .id{color:var(--merah)}
.lvbtn{cursor:pointer;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700;background:transparent;color:var(--faint);border:1.5px solid var(--line);font-family:inherit}
.lvbtn.on{background:var(--deep);color:#F2E8D5;border-color:var(--deep)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.center{text-align:center}.faint{color:var(--faint)}
.scenes{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.scene{cursor:pointer;background:var(--paper);border:1.5px solid var(--line);border-radius:16px;padding:18px 14px;text-align:center;box-shadow:0 2px 8px rgba(30,39,73,.05);font-family:inherit}
.bubble{background:var(--deep);color:#F2E8D5;border-radius:16px 16px 16px 4px;padding:14px 16px;margin-bottom:6px;max-width:88%}
.playbtn{cursor:pointer;width:96px;height:96px;border-radius:50%;background:var(--deep);color:#F2E8D5;font-size:38px;border:none;box-shadow:0 8px 24px rgba(27,44,92,.35);margin:14px 0}
.score{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.vrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
.vrow .w{font-family:Georgia,serif;font-style:italic;font-size:16px;font-weight:700;color:var(--deep)}
.vrow .m{font-size:13.5px;color:var(--ink)}
.vrow .sp{cursor:pointer;background:none;border:none;font-size:16px;padding:2px 6px}
.srow{border-left:3px solid var(--gold);padding-left:12px;margin:12px 0}
.srow .id{margin:0;font-family:Georgia,serif;font-style:italic;font-size:16px;color:var(--ink)}
.srow .zh{margin:2px 0 0;font-size:12.5px;color:var(--faint)}
.gbox{background:var(--sand);border-radius:12px;padding:12px 14px;margin:10px 0 16px;font-size:13.5px;line-height:1.8}
.freerow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.freebtn{cursor:pointer;flex:1;min-width:30%;background:var(--paper);border:1.5px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink)}
.freebtn .i{font-size:22px;display:block;margin-bottom:2px}
h3.sec{font-size:13px;color:var(--merah);letter-spacing:1px;margin:0 0 8px}
</style>
</head>

<script>
/* ============ 30天课程数据 [主题, 语法名, 语法讲解, 词汇[[印,中]], 例句[[印,中]]] ============ */
var DAYS=[
["问候与自我介绍","人称代词 & ini/itu","saya我 / kamu你(平辈) / Anda您(尊称) / dia他她 / kita我们 / mereka他们。ini=这，itu=那，可直接作主语：Ini teman saya（这是我朋友）。见面寒暄公式：Selamat+时间词 → Apa kabar? → Kabar baik!",[["nama","名字"],["saya","我"],["kamu","你"],["teman","朋友"],["senang","高兴"],["bertemu","见面"],["selamat","祝/安好"],["Anda","您"],["perkenalkan","请允许介绍"],["kabar","近况"]],[["Selamat pagi! Nama saya Wei.","早上好！我叫伟。"],["Siapa nama kamu?","你叫什么名字？"],["Ini teman saya.","这是我的朋友。"],["Senang bertemu dengan Anda.","很高兴认识您。"],["Apa kabar?","你好吗？"],["Kabar baik, terima kasih.","我很好，谢谢。"],["Perkenalkan, nama saya Wei.","自我介绍一下，我叫伟。"]]],
["国籍与语言","dari(来自) & bisa(会)","dari+地名表来源：Saya dari Tiongkok。bisa+动词表能力：bisa bicara会说。听不懂救场三连：Saya belum mengerti → Tolong ulangi → Tolong bicara pelan-pelan（词叠用=更加，pelan-pelan慢慢地）。",[["dari","来自"],["Tiongkok","中国"],["bicara","说话"],["bahasa","语言"],["orang","人"],["sedikit","一点"],["negara","国家"],["mengerti","明白"],["pelan","慢"],["ulangi","重复"]],[["Saya dari Tiongkok.","我来自中国。"],["Saya bisa bicara sedikit bahasa Indonesia.","我会说一点印尼语。"],["Kamu dari mana?","你来自哪里？"],["Dia orang Indonesia.","他是印尼人。"],["Tolong bicara pelan-pelan.","请说慢一点。"],["Saya belum mengerti.","我还不明白。"],["Kamu bisa bahasa apa saja?","你会说哪些语言？"]]],
["数字与年龄","berapa(多少) & umur(年龄)","berapa问数量：Berapa umur kamu? 数字：satu1 dua2 tiga3 empat4 lima5 enam6 tujuh7 delapan8 sembilan9 sepuluh10；puluh十位 ratus百 ribu千。电话号码逐位读，0读kosong。",[["umur","年龄"],["tahun","年/岁"],["berapa","多少"],["nomor","号码"],["telepon","电话"],["punya","拥有"],["satu","一"],["dua","二"],["tiga","三"],["kosong","零/空"]],[["Umur saya dua puluh lima tahun.","我25岁。"],["Berapa umur kamu?","你多大？"],["Saya punya dua adik.","我有两个弟弟妹妹。"],["Berapa nomor telepon kamu?","你的电话号码是多少？"],["Umur dia tiga puluh tahun.","他30岁。"],["Nomor saya kosong delapan satu dua.","我的号码是0812。"],["Satu, dua, tiga—ayo mulai!","一、二、三——开始！"]]],
["家庭成员","所有格：名词+代词","印尼语所有格后置：ibu saya=我的妈妈。punya表「有」：Saya punya kakak。seorang=一位(人的量词)：seorang guru一位老师。",[["keluarga","家人"],["ayah","爸爸"],["ibu","妈妈"],["kakak","哥哥/姐姐"],["adik","弟弟/妹妹"],["bekerja","工作"],["suami","丈夫"],["istri","妻子"],["anak","孩子"],["seorang","一位"]],[["Ini keluarga saya.","这是我的家人。"],["Ayah saya bekerja di bank.","我爸爸在银行工作。"],["Kakak saya seorang guru.","我姐姐是老师。"],["Kamu punya berapa saudara?","你有几个兄弟姐妹？"],["Saya sudah punya dua anak.","我已经有两个孩子了。"],["Istri saya orang Indonesia.","我妻子是印尼人。"],["Ibu saya tinggal di Beijing.","我妈妈住在北京。"]]],
["日期与星期","hari/tanggal & depan","hari=星期(hari Senin周一，hari Minggu周日)，tanggal=日期。depan=下个：minggu depan下周，bulan depan下个月。kemarin昨天 / hari ini今天 / besok明天。",[["hari","天/星期"],["tanggal","日期"],["bulan","月"],["Senin","星期一"],["Sabtu","星期六"],["ulang tahun","生日"],["minggu","周/星期日"],["kemarin","昨天"],["depan","下个/前面"],["libur","休假"]],[["Hari ini hari Senin.","今天是星期一。"],["Ulang tahun saya tanggal lima Mei.","我的生日是5月5日。"],["Kita bertemu pada hari Sabtu.","我们星期六见面。"],["Sekarang bulan Juli.","现在是七月。"],["Kemarin saya tidak bekerja.","昨天我没上班。"],["Minggu depan saya libur.","下周我休假。"],["Bulan depan saya ulang tahun.","下个月我过生日。"]]],
["时间表达","jam/pukul(点钟)","问时间：Jam berapa? 回答pukul/jam+数字：pukul tujuh七点。一天时段：pagi早(5-10点) siang中午(10-15点) sore下午(15-18点) malam晚上。setiap hari每天。",[["jam","点钟"],["sekarang","现在"],["pagi","早上"],["bangun","起床"],["buka","开门"],["setiap","每"],["menit","分钟"],["siang","中午"],["sore","下午"],["malam","晚上"]],[["Sekarang jam berapa?","现在几点？"],["Sekarang pukul tujuh pagi.","现在早上七点。"],["Saya bangun jam enam setiap hari.","我每天六点起床。"],["Toko buka jam sembilan.","商店九点开门。"],["Selamat malam!","晚上好！"],["Saya makan siang jam dua belas.","我十二点吃午饭。"],["Lima menit lagi ya.","再等五分钟哦。"]]],
["第一周复习","串联自我介绍","把本周内容串成1分钟自我介绍：问候→名字→国籍→年龄→家庭→日常作息。招待用语：Silakan masuk请进、Silakan duduk请坐。今天的场景实战解锁「朋友闲聊」！",[["halo","你好"],["tinggal","居住"],["di","在"],["mana","哪里"],["juga","也"],["terima kasih","谢谢"],["baik","好"],["silakan","请(招待)"],["permisi","打扰了"],["duduk","坐"]],[["Halo, nama saya Wei, saya dari Tiongkok.","你好，我叫伟，来自中国。"],["Kamu tinggal di mana?","你住在哪里？"],["Saya tinggal di Jakarta.","我住在雅加达。"],["Senang bertemu kamu juga!","我也很高兴认识你！"],["Baik-baik saja, terima kasih!","挺好的，谢谢！"],["Permisi, saya pulang dulu.","不好意思，我先回去了。"],["Silakan duduk di sini.","请坐这里。"]]],
["日常动作动词","常用动词原形","口语动词常用原形：makan吃 minum喝 pergi去 pulang回家 tidur睡 mandi洗澡 masak做饭。sebelum=在…之前：sebelum tidur睡前。jalan kaki=步行。",[["makan","吃"],["minum","喝"],["pergi","去"],["pulang","回家"],["tidur","睡觉"],["kantor","办公室"],["mandi","洗澡"],["masak","做饭"],["jalan","走/路"],["sebelum","在…之前"]],[["Saya makan nasi setiap hari.","我每天吃米饭。"],["Saya pergi ke kantor jam delapan.","我八点去公司。"],["Kamu mau minum apa?","你想喝什么？"],["Saya pulang jam lima sore.","我下午五点回家。"],["Ibu saya suka masak.","我妈妈喜欢做饭。"],["Saya jalan kaki ke kantor.","我走路去公司。"],["Saya mandi sebelum tidur.","我睡前洗澡。"]]],
["me-前缀初识","动词前缀 me-","正式动词加me-：beli→membeli买，lihat→melihat看，baca→membaca读，tulis→menulis写，dengar→mendengar听，tonton→menonton看(节目)。先会认即可，口语可用原形。",[["membeli","买"],["melihat","看"],["membaca","读"],["buah","水果"],["menu","菜单"],["buku","书"],["menulis","写"],["mendengar","听"],["menonton","看(节目)"],["film","电影"]],[["Saya mau membeli buah.","我想买水果。"],["Saya sedang melihat menu.","我正在看菜单。"],["Dia membaca buku.","他在读书。"],["Saya membeli buku baru.","我买了新书。"],["Saya suka menulis di pagi hari.","我喜欢在早上写作。"],["Dia sedang mendengar musik.","他正在听音乐。"],["Saya menonton film di rumah.","我在家看电影。"]]],
["食物与点餐","mau(想要) & tolong(请)","点餐句型：Saya mau pesan+菜名。tolong开头表礼貌请求。常见菜：nasi goreng炒饭 ayam goreng炸鸡 ikan bakar烤鱼 sayur蔬菜。问有什么：…apa saja?",[["pesan","点(菜)"],["nasi goreng","炒饭"],["air putih","白开水"],["harga","价格"],["enak","好吃"],["tolong","请"],["ayam","鸡"],["ikan","鱼"],["sayur","蔬菜"],["minuman","饮料"]],[["Saya mau pesan nasi goreng.","我想点炒饭。"],["Tolong beri saya air putih.","请给我白开水。"],["Berapa harganya?","这个多少钱？"],["Enak sekali!","非常好吃！"],["Saya mau ayam goreng.","我要炸鸡。"],["Ada sayur apa hari ini?","今天有什么蔬菜？"],["Minumannya apa saja?","饮料有哪些？"]]],
["数量与货币","量词 & ribu/juta","satu porsi一份，dua gelas两杯，botol瓶。印尼盾以千计：ribu千 → lima puluh ribu五万；juta百万。cukup=足够：tidak cukup不够。",[["porsi","份"],["gelas","杯"],["botol","瓶"],["ribu","千"],["rupiah","印尼盾"],["mie","面"],["ratus","百"],["juta","百万"],["uang","钱"],["cukup","足够"]],[["Satu porsi mie, berapa harganya?","一份面多少钱？"],["Ini lima puluh ribu rupiah.","这是五万印尼盾。"],["Saya mau dua botol air.","我要两瓶水。"],["Satu gelas es teh, tolong.","请来一杯冰茶。"],["Satu juta rupiah? Mahal sekali!","一百万盾？太贵了！"],["Uang saya tidak cukup.","我的钱不够。"],["Ini dua ratus ribu rupiah.","这是二十万盾。"]]],
["购物场景","形容词后置 & ada(有)","形容词放名词后：baju baru新衣服。ada表存在：Apakah ada…?有…吗。试穿：Boleh saya coba? 问折扣：Ada diskon? pas=正合适。",[["baju","衣服"],["baru","新的"],["mahal","贵的"],["murah","便宜的"],["warna","颜色"],["ukuran","尺码"],["coba","试"],["pas","正合适"],["diskon","折扣"],["kecil","小的"]],[["Apakah ada ukuran lain?","有别的尺码吗？"],["Baju ini terlalu mahal.","这件衣服太贵了。"],["Bisa kurang?","可以便宜点吗？"],["Saya suka warna biru.","我喜欢蓝色。"],["Boleh saya coba?","我可以试穿吗？"],["Ada diskon tidak?","有折扣吗？"],["Ukuran ini pas untuk saya.","这个尺码正合适。"]]],
["问路与交通","di mana & 方向词","di mana=在哪里。方向：kiri左 kanan右 lurus直走 belok转弯 seberang对面。距离：dekat近 jauh远。naik+交通工具=乘坐：naik bus坐公交。",[["stasiun","车站"],["kiri","左"],["kanan","右"],["lurus","直走"],["belok","转弯"],["naik","乘坐"],["dekat","近"],["jauh","远"],["seberang","对面"],["halte","公交站"]],[["Permisi, di mana stasiun terdekat?","请问最近的车站在哪？"],["Belok kiri, lalu lurus terus.","向左转，然后一直直走。"],["Berapa lama dari sini?","从这里要多久？"],["Saya naik bus ke kantor.","我坐公交车去上班。"],["Apakah jauh dari sini?","离这里远吗？"],["Bank ada di seberang jalan.","银行在马路对面。"],["Halte bus ada di dekat sana.","公交站就在那附近。"]]],

var TIPS={
"Berapa harganya?":"问价三连：指着东西→说这句→听数字。berapa(多少)+harga(价格)+nya(它)。",
"Bisa kurang?":"砍价只需两个词！「比萨哭朗」——比萨太贵哭出声。配合心痛表情效果翻倍。",
"Saya mau pesan nasi goreng.":"万能点餐公式：Saya mau pesan+菜名。把nasi goreng换成任何菜都成立。",
"Kamu sedang apa?":"时态三兄弟口诀：sudah已经/sedang正在/akan将要——动词永不变形，全靠这仨！",
"Boleh saya bertanya?":"boleh saya+动词=万能许可句式：boleh saya lihat能看吗、boleh saya duduk能坐吗。",
"Saya sudah makan.":"sudah=速哒，已完成。回答吃了没：Sudah!(吃了) / Belum.(还没)——印尼日常寒暄高频。",
"Permisi, di mana stasiun terdekat?":"问路公式：Permisi(打扰)+di mana(在哪)+地点。permisi开头永远礼貌。",
"Tolong beri saya air putih.":"tolong开头=礼貌请求。「多浪·杯里」——浪大了请把水倒杯里。"
};
/* ============ 存储 ============ */
function store(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k)||"null");localStorage.setItem(k,JSON.stringify(v))}catch(e){return null}}
function doneDays(){return store("bf_days")||[]}
function markDone(i){var d=doneDays();if(d.indexOf(i)<0){d.push(i);store("bf_days",d)}updateHeader()}
function curDay(){var d=doneDays();for(var i=0;i<30;i++){if(d.indexOf(i)<0)return i}return 29}
function loadErr(){return store("bf_errors")||[]}
function saveErr(l){store("bf_errors",l)}
function logErr(id,zh,type){
  var list=loadErr(),f=null;
  for(var i=0;i<list.length;i++){if(list[i].id===id){f=list[i];break}}
  if(f){f.n++}else list.push({id:id,zh:zh,type:type,n:1});
  saveErr(list);
}
function removeErr(id){var l=loadErr(),o=[];for(var i=0;i<l.length;i++){if(l[i].id!==id)o.push(l[i])}saveErr(o)}
function genMnemo(sentence){
  if(TIPS[sentence])return[["💡 句型助记",TIPS[sentence]]];
  var words=sentence.toLowerCase().replace(/[.,!?]/g,"").split(/\s+/),out=[],seen={};
  for(var i=0;i<words.length;i++){var w=words[i];if(MNEMO[w]&&!seen[w]){out.push([w,MNEMO[w]]);seen[w]=1}}
  if(out.length===0)out.push(["💡","拆成2-3块，每块大声读3遍再连读3遍——肌肉记忆比死记牢。"]);
  return out;
}
/* ============ 工具 ============ */
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function speak(text,rate){try{window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang="id-ID";u.rate=rate||0.85;var vs=window.speechSynthesis.getVoices();for(var i=0;i<vs.length;i++){if(vs[i].lang&&vs[i].lang.indexOf("id")===0){u.voice=vs[i];break}}window.speechSynthesis.speak(u)}catch(e){}}
function norm(s){return s.toLowerCase().replace(/[.,!?'"-]/g,"").trim()}
var app=document.getElementById("app"),timer=null;
function clearT(){if(timer){clearInterval(timer);timer=null}}
function updateHeader(){document.getElementById("hdone").innerHTML=doneDays().length+"<span>/30</span>"}
window.speechSynthesis&&window.speechSynthesis.getVoices();

function dayLearn(){
  clearT();
  var day=DAYS[D.di],h=dayHead(0,"① 学");

/* --- 第2步：闪电反应（当天内容+复习） --- */
function dayFlash(){
  var day=DAYS[D.di],pool=[];
  for(var i=0;i<day[4].length;i++)pool.push([day[4][i][1],day[4][i][0]]);
  var vs=shuffle(day[3]).slice(0,4);
  for(var v=0;v<vs.length;v++)pool.push([vs[v][1],vs[v][0]]);
  /* 间隔复习：混入 D-1 和 D-3 的例句各1条 */
  var revs=[];
  if(D.di>=1)revs.push(D.di-1);
  if(D.di>=3)revs.push(D.di-3);
  for(var r=0;r<revs.length;r++){
    var rs=shuffle(DAYS[revs[r]][4])[0];
    pool.push([rs[1]+"（复习D"+(revs[r]+1)+"）",rs[0]]);
  }
  F={pool:shuffle(pool),i:0,ok:0,mode:"day"};
  flashGo();
}

function daySpeak(){S={pool:shuffle(DAYS[D.di][4]),i:0,result:null,err:null,listening:false,mode:"day",total:DAYS[D.di][4].length};speakRender()}

  '<h2 style="font-size:26px;margin:0 0 8px;line-height:1.4">'+esc(F.pool[F.i][0])+'</h2>'+
  '<p id="fnum" class="serif" style="font-size:40px;color:var(--gold);margin:16px 0">6</p>'+
  '<button class="btn ghost" onclick="clearT();flashReveal()">说完了 / 直接看答案</button>'+
  '<button class="back" style="margin:18px auto 0" onclick="home()">← 退出</button></div>';
  timer=setInterval(function(){left--;
    var b=document.getElementById("fbar"),n=document.getElementById("fnum");
    if(b)b.style.width=(left/6*100)+"%";
    if(n){n.textContent=left;if(left<=2){n.style.color="var(--merah)";if(b)b.style.background="var(--merah)"}}
    if(left<=0){clearT();flashReveal()}
  },1000);
}
function flashReveal(){
  var ans=F.pool[F.i][1];speak(ans,0.9);
  app.innerHTML='<div class="card center">'+
  '<p style="font-size:13px" class="faint">第 '+(F.i+1)+'/'+F.pool.length+' 题</p>'+
  '<h2 style="font-size:22px;margin:0;line-height:1.4">'+esc(F.pool[F.i][0])+'</h2>'+
  '<p class="serif" style="font-size:23px;color:var(--deep);margin:18px 0 6px">'+esc(ans)+'</p>'+
  '<button class="back" style="color:var(--teal);font-weight:700;margin:0 auto" onclick="speak('+JSON.stringify(ans).replace(/"/g,"&quot;")+',0.85)">🔊 再听一遍</button>'+
  '<p style="font-size:13px;margin:18px 0 10px" class="faint">你在倒计时内说对了吗？（诚实自评）</p>'+
  '<div class="grid2"><button class="btn teal" onclick="flashGrade(1)">✓ 说对了</button><button class="btn red" onclick="flashGrade(0)">✗ 没反应过来</button></div></div>';
}
function flashGrade(ok){
  if(ok)F.ok++;
  else logErr(F.pool[F.i][1],F.pool[F.i][0].replace(/（复习D\d+）/,""),"flash");
  F.i++;
  if(F.i>=F.pool.length){
    if(F.mode==="day"){
      app.innerHTML='<div class="card center"><div style="font-size:44px">⚡</div>'+
      '<h3 class="serif" style="font-size:26px;color:var(--deep);margin:8px 0 4px">'+F.ok+' / '+F.pool.length+'</h3>'+
      '<p class="faint" style="font-size:14px;margin:0 0 20px">6秒内脱口而出的数量。答错的已自动进错题本。</p>'+
      '<div style="display:grid;gap:10px"><button class="btn" onclick="dayListen()">下一步 → 🎧 盲听训练</button>'+
      '<button class="btn ghost" onclick="dayFlash()">重来一轮</button></div></div>';
    }else{
      app.innerHTML='<div class="card center"><div style="font-size:44px">⚡</div>'+
      '<h3 class="serif" style="font-size:26px;color:var(--deep);margin:8px 0 4px">'+F.ok+' / '+F.pool.length+'</h3>'+
      '<p class="faint" style="font-size:14px;margin:0 0 20px">随机加练完成，答错的已进错题本。</p>'+
      '<div style="display:grid;gap:10px"><button class="btn red" onclick="freeFlash()">再来一轮</button><button class="btn ghost" onclick="home()">返回</button></div></div>';
    }
  }else flashGo();
}

/* ============ 🎧 盲听（共用引擎） ============ */
var L={};
function listenRender(){
  var pair=L.pool[L.i%L.pool.length],cur=pair[0],zh=pair[1];
  var prog=L.mode==="day"?("句 "+(Math.min(L.i+1,L.total))+"/"+L.total+" · "):"";
  app.innerHTML='<div class="card">'+
  '<p style="font-size:13px;margin:0" class="faint center">🎧 '+prog+'先听，<b>不看文字</b>，脑中理解后再揭晓</p>'+
  '<div class="center" style="padding:6px 0">'+
  '<button class="playbtn" onclick="listenPlay()">🔊</button>'+
  '<p id="lplays" style="font-size:12px" class="faint">已播放 '+L.plays+' 次（听懂前可反复听）</p>'+
  '<button class="lvbtn" style="color:var(--gold);border-color:var(--gold)" onclick="listenRate()">语速 '+(L.rate<=0.65?"慢":L.rate<=0.8?"中":"快")+'</button>'+
  (L.revealed?
    '<div style="margin:16px 0"><p class="serif" style="font-size:21px;color:var(--deep);margin:0 0 4px">'+esc(cur)+'</p>'+
    '<p style="font-size:13px;margin:0 0 14px" class="faint">'+esc(zh)+'</p>'+
    '<p style="font-size:13px;color:var(--teal);margin:0 0 14px">跟着读一遍 →</p>'+
    '<button class="btn" onclick="listenNext()">'+(L.mode==="day"&&L.i+1>=L.total?"完成盲听 → 🎤 跟读":"下一句")+'</button></div>'
    :'<div style="margin-top:12px"><button class="btn ghost" onclick="listenReveal()">听懂了，揭晓原文</button></div>')+
  '<button class="back" style="margin:16px auto 0" onclick="home()">← 退出</button></div></div>';
  if(L.plays===0)setTimeout(listenPlay,300);
}
function listenPlay(){speak(L.pool[L.i%L.pool.length][0],L.rate);L.plays++;var p=document.getElementById("lplays");if(p)p.textContent="已播放 "+L.plays+" 次（听懂前可反复听）"}
function listenRate(){L.rate=L.rate>=1?0.6:L.rate+0.15;listenRender()}
function listenReveal(){L.revealed=true;listenRender()}
function listenNext(){
  if(L.mode==="day"&&L.i+1>=L.total){daySpeak();return}
  L.i++;L.plays=0;L.revealed=false;listenRender();
}

/* ============ 🎤 跟读（共用引擎） ============ */
var S={};
function speakRender(){
  var pair=S.pool[S.i%S.pool.length],cur=pair[0];
  var prog=S.mode==="day"?("句 "+(Math.min(S.i+1,S.total))+"/"+S.total+" · "):"";
  var sentHtml;
  if(S.result){sentHtml="";for(var i=0;i<S.result.words.length;i++){var w=S.result.words[i];
    sentHtml+='<span style="color:'+(w[1]?"var(--teal)":"var(--merah)")+';'+(w[1]?"":"border-bottom:2px solid var(--merah)")+'">'+esc(w[0])+' </span>'}}
  else sentHtml=esc(cur);
  var errMsg="";
  if(S.err==="nosupport")errMsg='<p style="font-size:13px;color:var(--merah)" class="center">当前浏览器不支持语音识别（iPhone Safari受限），可跳过评分，跟着示范大声读3遍同样有效。</p>';
  if(S.err==="mic")errMsg='<p style="font-size:13px;color:var(--merah)" class="center">需要麦克风权限，请在浏览器设置中允许。</p>';
  if(S.err==="other")errMsg='<p style="font-size:13px;color:var(--merah)" class="center">没听清，请靠近麦克风再试。</p>';
  var scoreHtml="";
  if(S.result){var pct=S.result.pct,col=pct>=80?"var(--teal)":pct>=50?"var(--gold)":"var(--merah)";
    scoreHtml='<div class="score"><div style="display:flex;justify-content:space-between;align-items:baseline">'+
    '<span class="serif" style="font-size:30px;font-weight:700;color:'+col+'">'+pct+'分</span>'+
    '<span style="font-size:12px" class="faint">'+(pct>=80?"发音很清晰！":pct>=50?"不错，红字的词再练":"先听示范再逐词模仿")+'</span></div>'+
    '<p style="font-size:12.5px;margin:8px 0 0" class="faint">系统听到：「'+esc(S.result.heard)+'」</p></div>';}
  app.innerHTML='<div class="card">'+
  '<p style="font-size:13px;margin:0 0 6px" class="faint center">🎤 '+prog+'听示范 → 录音跟读 → 逐词打分</p>'+
  '<p class="serif center" style="font-size:22px;color:var(--deep);margin:12px 0 4px">'+sentHtml+'</p>'+
  '<p class="center" style="font-size:12.5px;margin:0 0 16px" class="faint"><span class="faint">'+esc(pair[1])+'</span></p>'+
  '<div class="grid2" style="margin-bottom:14px">'+
  '<button class="btn teal" onclick="speakDemo()">🔊 听示范</button>'+
  '<button class="btn'+(S.listening?" red":"")+'" onclick="speakRec()">'+(S.listening?"● 正在听你说…":"🎤 录音跟读")+'</button></div>'+
  scoreHtml+errMsg+
  '<div style="display:grid;gap:10px;margin-top:6px">'+
  '<button class="btn ghost" onclick="speakNext()">'+(S.mode==="day"&&S.i+1>=S.total?"完成跟读 → 🏝️ 打卡":"下一句 →")+'</button>'+
  '<button class="back" style="margin:0 auto" onclick="home()">← 退出</button></div></div>';
}
function speakDemo(){speak(S.pool[S.i%S.pool.length][0],0.75)}
function speakNext(){
  if(S.mode==="day"&&S.i+1>=S.total){dayDone();return}
  S.i++;S.result=null;S.err=null;speakRender();
}
function speakRec(){
  if(S.listening)return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){S.err="nosupport";speakRender();return}
  var cur=S.pool[S.i%S.pool.length][0];
  S.result=null;S.err=null;S.listening=true;speakRender();
  var rec=new SR();rec.lang="id-ID";rec.interimResults=false;rec.maxAlternatives=3;
  rec.onresult=function(e){
    var heard=e.results[0][0].transcript;
    var t=norm(cur).split(/\s+/),h=norm(heard).split(/\s+/),words=[],hit=0;
    for(var i=0;i<t.length;i++){var ok=h.indexOf(t[i])>=0;if(ok)hit++;words.push([t[i],ok])}
    S.result={heard:heard,pct:Math.round(hit/t.length*100),words:words};
    if(S.result.pct<60)logErr(cur,"发音待加强","speak");
    S.listening=false;speakRender();
  };
  rec.onerror=function(e){S.err=(e.error==="not-allowed"?"mic":"other");S.listening=false;speakRender()};
  rec.onend=function(){if(S.listening){S.listening=false;speakRender()}};
  try{rec.start()}catch(e){S.err="other";S.listening=false;speakRender()}
}

/* ============ 🎬 场景实战 ============ */
var G={};
function sceneMenu(){
  clearT();
  var cd=curDay(),h='<button class="back" onclick="home()">← 返回</button><div class="scenes">';
  for(var i=0;i<SCENES.length;i++){
    var locked=cd+1<SCENES[i].unlock&&doneDays().indexOf(SCENES[i].unlock-1)<0;
    if(locked){
      h+='<div class="scene" style="opacity:.45"><span style="font-size:32px;display:block">🔒</span>'+
      '<span style="font-weight:700;font-size:15px;color:var(--faint);display:block;margin-top:6px">'+SCENES[i].name+'</span>'+
      '<span style="font-size:12px" class="faint">Day '+SCENES[i].unlock+' 解锁</span></div>';
    }else{
      h+='<button class="scene" onclick="sceneStart('+i+')"><span style="font-size:32px;display:block">'+SCENES[i].icon+'</span>'+
      '<span style="font-weight:700;font-size:15px;color:var(--deep);display:block;margin-top:6px">'+SCENES[i].name+'</span>'+
      '<span style="font-size:12px" class="faint">'+SCENES[i].lines.length+' 回合</span></button>';
    }
  }
  app.innerHTML=h+'</div><p style="font-size:12px;margin-top:12px" class="faint">场景随课程进度解锁——学过对应句型再实战，命中率更高。</p>';
}
function sceneStart(si){G={si:si,i:0,score:0};sceneGo()}
function sceneGo(){
  clearT();
  var sc=SCENES[G.si],line=sc.lines[G.i];
  G.opts=shuffle(line.r);G.picked=null;
  speak(line.id,0.8);
  var left=8;
  sceneRender();
  timer=setInterval(function(){left--;
    var b=document.getElementById("sbar"),n=document.getElementById("snum");
    if(b){b.style.width=(left/8*100)+"%";if(left<=3)b.style.background="var(--merah)"}
    if(n){n.textContent="⏱ "+left+"s";if(left<=3)n.style.color="var(--merah)"}
    if(left<=0){clearT();G.picked="timeout";
      for(var q=0;q<G.opts.length;q++){if(G.opts[q][2]){logErr(G.opts[q][0],G.opts[q][1],"scene");break}}
      sceneRender()}
  },1000);
}
function sceneRender(){
  var sc=SCENES[G.si],line=sc.lines[G.i];
  var h='<div class="card">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
  '<span style="font-size:13px;font-weight:700;color:var(--deep)">'+sc.icon+' '+sc.name+' · 回合 '+(G.i+1)+'/'+sc.lines.length+'</span>'+
  '<span id="snum" style="font-size:13px;font-weight:700" class="faint">⏱ 8s</span></div>'+
  '<div class="bar" style="margin-bottom:18px;height:5px"><div id="sbar" style="width:100%;background:var(--teal)"></div></div>'+
  '<div class="bubble"><p class="serif" style="margin:0;font-size:17px">'+esc(line.id)+'</p>'+
  '<p id="szh" style="margin:6px 0 0;font-size:12.5px;color:#8FA0CC;display:none">'+esc(line.zh)+'</p></div>'+
  '<div style="display:flex;gap:14px;margin-bottom:18px">'+
  '<button class="back" style="margin:0;color:var(--teal);font-weight:700" onclick="sceneHear()">🔊 重听</button>'+
  '<button class="back" style="margin:0" onclick="document.getElementById(\'szh\').style.display=\'block\'">看中文提示</button></div>'+
  '<p style="font-size:13px;margin:0 0 10px" class="faint">8秒内选出回应，选完<b>大声读出来</b>：</p>'+
  '<div style="display:grid;gap:10px">';
  for(var k=0;k<G.opts.length;k++){
    var r=G.opts[k],cls="opt";
    if(G.picked!==null){if(r[2])cls+=" ok";else if(G.picked===k)cls+=" bad"}
    h+='<button class="'+cls+'" onclick="scenePick('+k+')"><span class="id">'+esc(r[0])+'</span>'+
    (G.picked!==null?'<span class="zh">'+esc(r[1])+'</span>':"")+'</button>';
  }
  h+='</div>';
  if(G.picked==="timeout")h+='<p style="font-size:13px;color:var(--merah);margin:12px 0 0" class="center">超时！真实对话的沉默就是这感觉——听正确答案跟读一遍再继续。</p>';
  if(G.picked!==null)h+='<button class="btn" style="margin-top:14px" onclick="sceneNext()">'+(G.i+1>=sc.lines.length?"查看结果":"下一回合 →")+'</button>';
  app.innerHTML=h+'</div>';
}
function sceneHear(){speak(SCENES[G.si].lines[G.i].id,0.75)}
function scenePick(k){
  if(G.picked!==null)return;
  clearT();G.picked=k;
  var r=G.opts[k];
  if(r[2]){G.score++;speak(r[0],0.85)}
  else{for(var i=0;i<G.opts.length;i++){if(G.opts[i][2]){logErr(G.opts[i][0],G.opts[i][1],"scene");break}}}
  sceneRender();
}
function sceneNext(){
  var sc=SCENES[G.si];
  if(G.i+1>=sc.lines.length){
    clearT();
    app.innerHTML='<div class="card center"><div style="font-size:44px">'+sc.icon+'</div>'+
    '<h3 class="serif" style="font-size:24px;color:var(--deep);margin:8px 0 4px">'+sc.name+' · '+G.score+'/'+sc.lines.length+'</h3>'+
    '<p class="faint" style="font-size:14px;margin:0 0 20px">'+(G.score===sc.lines.length?"全对！这个场景你已经能实战了。":"把没答对的重跑一遍——真实对话不会给你第二次8秒。")+'</p>'+
    '<div style="display:grid;gap:10px"><button class="btn red" onclick="sceneStart('+G.si+')">重跑本场景</button>'+
    '<button class="btn ghost" onclick="sceneMenu()">选择其他场景</button></div></div>';
  }else{G.i++;sceneGo()}
}

/* ============ 📒 错题本 + 助记 ============ */
function errBook(){
  clearT();window.speechSynthesis&&window.speechSynthesis.cancel();
  var list=loadErr().slice().sort(function(a,b){return b.n-a.n});
  var h='<button class="back" onclick="home()">← 返回</button><div class="card">';
  if(list.length===0){
    h+='<div class="center" style="padding:20px 0"><div style="font-size:44px">📒</div>'+
    '<p class="faint" style="font-size:14px;line-height:1.8">错题本是空的。训练中：<br>⚡自评「没反应过来」、🎬答错或超时、<br>🎤评分低于60分——都会自动收进来。</p>'+
    '<button class="btn" onclick="home()">去训练</button></div>';
  }else{
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
    '<span style="font-size:14px;font-weight:700;color:var(--deep)">📒 '+list.length+' 条待攻克</span>'+
    '<span style="font-size:12px" class="faint">按错误次数排序</span></div>'+
    '<button class="btn red" style="margin-bottom:16px" onclick="errDrill()">⚡ 用错题重练一轮</button>';
    var typeIcon={flash:"⚡",scene:"🎬",speak:"🎤"};
    for(var i=0;i<list.length;i++){
      var e=list[i],mn=genMnemo(e.id),mh="";
      for(var m=0;m<mn.length;m++)mh+='<p style="font-size:12.5px;line-height:1.7;margin:4px 0 0;color:var(--ink)"><b style="color:var(--gold)">'+esc(mn[m][0])+'</b> '+esc(mn[m][1])+'</p>';
      h+='<div style="border-top:1px solid var(--line);padding:14px 0">'+
      '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">'+
      '<span class="serif" style="font-size:17px;color:var(--deep)">'+esc(e.id)+'</span>'+
      '<span style="font-size:11px;color:var(--merah);font-weight:700;white-space:nowrap">'+(typeIcon[e.type]||"")+' 错'+e.n+'次</span></div>'+
      '<p style="font-size:12.5px;margin:2px 0 6px" class="faint">'+esc(e.zh)+'</p>'+
      '<div style="background:var(--sand);border-radius:10px;padding:10px 12px">'+mh+'</div>'+
      '<div style="display:flex;gap:12px;margin-top:8px">'+
      '<button class="back" style="margin:0;color:var(--teal);font-weight:700" onclick="speak('+JSON.stringify(e.id).replace(/"/g,"&quot;")+',0.8)">🔊 听发音</button>'+
      '<button class="back" style="margin:0" onclick="errMaster('+JSON.stringify(e.id).replace(/"/g,"&quot;")+')">✓ 已掌握，移除</button></div></div>';
    }
    h+='<p style="font-size:12px;margin-top:12px" class="faint">💾 记录存在这台手机的浏览器里；清除浏览器数据会清空。</p>';
  }
  app.innerHTML=h+'</div>';
}
function errMaster(id){removeErr(id);errBook()}
function errDrill(){
  var list=loadErr();
  if(list.length===0){errBook();return}
  var sorted=list.slice().sort(function(a,b){return b.n-a.n}).slice(0,10),pool=[];
  for(var i=0;i<sorted.length;i++)pool.push([sorted[i].zh,sorted[i].id]);
  F={pool:shuffle(pool),i:0,ok:0,mode:"free"};
  flashGo();
}

home();
</script>
</body>
